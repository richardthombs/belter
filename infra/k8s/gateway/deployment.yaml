apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: registry.digitalocean.com/belterlife/gateway:latest
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: belterlife-secrets
            - configMapRef:
                name: belterlife-config
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
