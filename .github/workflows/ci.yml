name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-server:
    name: Build & Test Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore server/BelterLife.slnx

      - name: Build
        run: dotnet build server/BelterLife.slnx --no-restore -c Release

      - name: Test
        run: dotnet test server/BelterLife.slnx --no-build -c Release --verbosity normal

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client
